<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tucumán Dashboard App</title>  <script src="https://cdn.tailwindcss.com"></script>  <script src="https://unpkg.com/lucide@latest"></script>  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">  <style>
    * { font-family: 'Inter', sans-serif; }

    .sidebar-mobile {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 260px;
      background: #1f2937;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 50;
    }

    .sidebar-mobile.open {
      transform: translateX(0);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 40;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: all;
    }
  </style></head><body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white"><!-- LOGIN --><div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow w-full max-w-sm">
    <h2 class="text-xl font-bold text-center mb-4">Tucumán App</h2>
    <input id="email" type="email" value="enzo@tucumandash.com" class="w-full mb-3 p-2 border rounded">
    <input id="password" type="password" value="demo1234" class="w-full mb-4 p-2 border rounded">
    <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">Ingresar</button>
  </div>
</div><!-- APP --><div id="dashboardScreen" class="hidden">  <!-- SIDEBAR MOBILE -->  <div id="mobileMenu" class="sidebar-mobile p-4 text-white">
    <h2 class="font-bold mb-6">Tucumán</h2>
    <nav class="space-y-3">
      <a href="#">🏠 Dashboard</a>
      <a href="#">☁️ Clima</a>
      <a href="#">📰 Noticias</a>
      <a href="#">💵 Dólar</a>
    </nav>
  </div>  <!-- OVERLAY -->  <div id="overlay" class="overlay" onclick="toggleMenu()"></div>  <!-- HEADER -->  <header class="flex items-center justify-between p-4 bg-white dark:bg-gray-800 shadow">
    <button onclick="toggleMenu()" class="text-xl">☰</button>
    <h1 class="font-bold">Dashboard</h1>
    <button onclick="toggleDarkMode()">🌙</button>
  </header>  <!-- CONTENIDO -->  <main class="p-4 space-y-4"><div class="grid grid-cols-1 gap-4">

  <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
    <p class="text-sm">Temperatura</p>
    <h2 id="tempValue" class="text-2xl font-bold">24°C</h2>
  </div>

  <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
    <p class="text-sm">Dólar Blue</p>
    <h2 id="dolarValue" class="text-2xl font-bold">$1245</h2>
  </div>

  <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
    <p class="text-sm">Noticias</p>
    <h2 id="newsCount" class="text-2xl font-bold">10</h2>
  </div>

</div>

  </main></div><script>
  function login() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboardScreen').classList.remove('hidden');
    updateData();
  }

  function updateData() {
    document.getElementById('tempValue').innerText = (22 + Math.floor(Math.random()*5)) + '°C';
    document.getElementById('dolarValue').innerText = '$' + (1200 + Math.floor(Math.random()*100));
    document.getElementById('newsCount').innerText = Math.floor(Math.random()*10) + 5;
  }

  function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }

  function toggleDarkMode() {
    document.body.classList.toggle('dark');
  }
</script></body>
</html>
